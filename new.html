    function updateActiveNav(pageId) {

        services: document.getElementById('nav-services'),
        contact: document.getElementById('nav-contact')
      };
      Object.keys(navLinks).forEach(key => {
        if (navLinks[key]) {
          if (key === pageId) {
            navLinks[key].classList.add('active-page');
            navLinks[key].setAttribute('aria-current', 'page');
          } else {
            navLinks[key].classList.remove('active-page');
            navLinks[key].removeAttribute('aria-current');
          }
        }
      });
    }

    function renderPage(pageId, pushState = true) {
      const page = pages[pageId];
      if (!page) return;
      const container = document.getElementById('page-container');
      if (container) {
        container.innerHTML = page.content;
        document.title = page.title;
        updateActiveNav(pageId);
        const internalLinks = document.querySelectorAll('[data-page]');
        internalLinks.forEach(link => {
          link.addEventListener('click', (e) => {
            e.preventDefault();
            const targetPage = link.getAttribute('data-page');
            if (targetPage && pages[targetPage]) {
              navigateTo(targetPage);
            }
          });
        });
        const mainEl = document.getElementById('main-content');
        if (mainEl) mainEl.focus();
        if (pushState) {
          const newUrl = `/${pageId === 'home' ? '' : pageId}.html`;
          window.history.pushState({ page: pageId }, page.title, newUrl);
        }
      }
    }

    function navigateTo(pageId) {

        currentPage = pageId;
        renderPage(pageId, true);
      }
    }

    window.addEventListener('popstate', (event) => {
      const state = event.state;
      if (state && state.page && pages[state.page]) {
        currentPage = state.page;
        renderPage(currentPage, false);
      } else {
        const path = window.location.pathname;
        if (path.includes('about')) navigateTo('about');
        else if (path.includes('services')) navigateTo('services');
        else if (path.includes('contact')) navigateTo('contact');
        else navigateTo('home');
      }
    });

    function initialLoad() {
      const path = window.location.pathname;
      if (path.includes('about')) currentPage = 'about';
      else if (path.includes('services')) currentPage = 'services';
      else if (path.includes('contact')) currentPage = 'contact';
      else currentPage = 'home';
      renderPage(currentPage, false);
      document.querySelectorAll('.nav-links a').forEach(anchor => {
        anchor.addEventListener('click', (e) => {
          e.preventDefault();
          let href = anchor.getAttribute('href');
          if (href.includes('about')) navigateTo('about');
          else if (href.includes('services')) navigateTo('services');
          else if (href.includes('contact')) navigateTo('contact');
          else navigateTo('home');
        });
      });
    }

    initialLoad();
  </script>
